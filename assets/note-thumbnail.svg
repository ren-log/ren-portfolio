<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 670" width="1280" height="670">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#221833"/>
      <stop offset="50%" stop-color="#191019"/>
      <stop offset="100%" stop-color="#231834"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="30%">
      <stop offset="0%" stop-color="#f2e2b0"/>
      <stop offset="45%" stop-color="#d8b986"/>
      <stop offset="75%" stop-color="#b3924f"/>
      <stop offset="100%" stop-color="#eedcae"/>
    </linearGradient>
    <linearGradient id="line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d8b986" stop-opacity="0"/>
      <stop offset="50%" stop-color="#d8b986" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#d8b986" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="1280" height="670" fill="url(#bg)"/>

  <!-- 上からの暖かい光と足元の紫 -->
  <ellipse cx="640" cy="-60" rx="820" ry="300" fill="#96734a" opacity="0.14"/>
  <ellipse cx="640" cy="740" rx="780" ry="260" fill="#645298" opacity="0.14"/>

  <!-- 浮遊する粒子 -->
  <g fill="#dec38c">
    <circle cx="140" cy="150" r="2.5" opacity="0.4"/>
    <circle cx="1130" cy="120" r="2" opacity="0.32"/>
    <circle cx="1180" cy="420" r="2.6" opacity="0.35"/>
    <circle cx="90" cy="470" r="1.8" opacity="0.3"/>
    <circle cx="320" cy="80" r="1.5" opacity="0.35"/>
    <circle cx="980" cy="560" r="2" opacity="0.3"/>
    <circle cx="240" cy="560" r="1.6" opacity="0.28"/>
    <circle cx="1040" cy="230" r="1.5" opacity="0.3"/>
    <circle cx="540" cy="110" r="1.4" opacity="0.26"/>
    <circle cx="760" cy="590" r="1.7" opacity="0.3"/>
  </g>
  <g fill="#e2e4f0">
    <circle cx="440" cy="600" r="1.4" opacity="0.22"/>
    <circle cx="860" cy="90" r="1.5" opacity="0.22"/>
    <circle cx="60" cy="300" r="1.3" opacity="0.2"/>
    <circle cx="1220" cy="280" r="1.4" opacity="0.2"/>
  </g>

  <!-- 細い金の枠 -->
  <rect x="26" y="26" width="1228" height="618" fill="none" stroke="#d8b986" stroke-opacity="0.4" stroke-width="1.5"/>
  <rect x="34" y="34" width="1212" height="602" fill="none" stroke="#d8b986" stroke-opacity="0.15" stroke-width="1"/>

  <!-- 英字キッカー -->
  <text x="640" y="128" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif" font-size="26" letter-spacing="14"
        fill="#d8b986" opacity="0.95">COMPLETE ZERO START</text>
  <line x1="470" y1="158" x2="810" y2="158" stroke="url(#line)" stroke-width="1.5"/>

  <!-- タイトル -->
  <g font-family="'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', 'Yu Gothic', sans-serif" text-anchor="middle">
    <text x="640" y="268" font-size="64" font-weight="800" fill="#f7f6f3" letter-spacing="4">会社員の副業、</text>
    <text x="640" y="378" font-size="76" font-weight="900" fill="url(#gold)" letter-spacing="3">完全ゼロスタートの</text>
    <text x="640" y="486" font-size="76" font-weight="900" fill="#f7f6f3" letter-spacing="6">リアル攻略メモ</text>
  </g>

  <!-- 下部の情報 -->
  <line x1="420" y1="540" x2="860" y2="540" stroke="url(#line)" stroke-width="1.5"/>
  <g font-family="'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', 'Yu Gothic', sans-serif" text-anchor="middle">
    <text x="640" y="592" font-size="30" font-weight="700" fill="#d8b986" letter-spacing="4">収益0円から、成功も失敗も全部公開</text>
  </g>

  <!-- 左下・右下のクレジット -->
  <text x="70" y="612" font-family="Georgia, serif" font-size="22" letter-spacing="6" fill="#8f8a97">REN.LOG</text>
  <text x="1210" y="612" text-anchor="end" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="22" fill="#8f8a97" letter-spacing="2">買い切り・追記無料</text>
</svg>
