<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="75%">
      <stop offset="0%" stop-color="#2b2033"/>
      <stop offset="55%" stop-color="#1d1622"/>
      <stop offset="100%" stop-color="#120d15"/>
    </radialGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f2e2b0"/>
      <stop offset="45%" stop-color="#d8b986"/>
      <stop offset="75%" stop-color="#a8874a"/>
      <stop offset="100%" stop-color="#eedcae"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#eedcae"/>
      <stop offset="50%" stop-color="#b3924f"/>
      <stop offset="100%" stop-color="#f2e2b0"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <circle cx="200" cy="200" r="200" fill="url(#bg)"/>

  <!-- 微かな粒子 -->
  <g fill="#dec38c">
    <circle cx="86" cy="110" r="2.2" opacity="0.35"/>
    <circle cx="318" cy="86" r="1.6" opacity="0.28"/>
    <circle cx="292" cy="300" r="2.4" opacity="0.30"/>
    <circle cx="108" cy="296" r="1.5" opacity="0.25"/>
    <circle cx="212" cy="60" r="1.4" opacity="0.30"/>
    <circle cx="60" cy="208" r="1.8" opacity="0.22"/>
    <circle cx="340" cy="196" r="1.5" opacity="0.26"/>
  </g>

  <!-- 上からの淡い光 -->
  <ellipse cx="200" cy="30" rx="220" ry="120" fill="#d8b986" opacity="0.08"/>

  <!-- 金のリング -->
  <circle cx="200" cy="200" r="188" fill="none" stroke="url(#ring)" stroke-width="4" opacity="0.9"/>
  <circle cx="200" cy="200" r="176" fill="none" stroke="#d8b986" stroke-width="1" opacity="0.3"/>

  <!-- モノグラム R -->
  <text x="200" y="252" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif" font-size="180" font-weight="bold"
        fill="url(#gold)" letter-spacing="2">R</text>

  <!-- 下部の飾り線とドット -->
  <line x1="150" y1="300" x2="185" y2="300" stroke="#d8b986" stroke-width="1.5" opacity="0.6"/>
  <circle cx="200" cy="300" r="3" fill="#d8b986" opacity="0.85"/>
  <line x1="215" y1="300" x2="250" y2="300" stroke="#d8b986" stroke-width="1.5" opacity="0.6"/>
</svg>
